// ——— SUPABASE ———
async function supaSet(payload){
  const r=await fetch(SUPA_URL+'/rest/v1/rv_comp',{method:'POST',
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify({id:'main',data:JSON.parse(payload),updated_at:new Date().toISOString()})});
  if(!r.ok)throw new Error(await r.text());
}
async function supaGet(){
  const r=await fetch(SUPA_URL+'/rest/v1/rv_comp?id=eq.main&select=data,updated_at',
    {headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
  const rows=await r.json();return rows&&rows.length?rows[0]:null;
}

}

// ——— CALCS ———
function bonAnt(e,at){
  const p=S.ant,par=p.params[e.cg]||{bl:1,v:0,el:false};
  let bl=0,vr=0;
  if(at>=p.gatilho)bl=e.sal*par.bl;
  if(par.el&&at>=p.piso){
    const fator=p.teto===p.piso?1:Math.min((at-p.piso)/(p.teto-p.piso),1);
    vr=e.sal*par.v*fator;
  }
  return{bl,vr,tot:bl+vr};
}
function bonAtu(e,at){
  const p=S.atu,m=p.mult[e.cg]||{F:2,M:1},mult=e.ta==='Fim'?m.F:m.M;
  if(at<p.piso)return 0;
  const fator=p.teto===p.piso?1:Math.min((at-p.piso)/(p.teto-p.piso),1);
  return e.sal*mult*fator;
}
function poolAnt(at){return S.employees.reduce((s,e)=>{const b=bonAnt(e,at??S.ating.ant);return s+b.tot;},0);}
function blAnt(at){return S.employees.reduce((s,e)=>s+bonAnt(e,at??S.ating.ant).bl,0);}
function vrAnt(at){return S.employees.reduce((s,e)=>s+bonAnt(e,at??S.ating.ant).vr,0);}
function poolAtu(at){return S.employees.reduce((s,e)=>s+bonAtu(e,at??S.ating.atu),0);}
function recReal(at){return S.fin.rec*(at/100);}
function lbReal(at){return S.fin.lb*(at/100);}

function drawAnt(){
  const at=S.ating.ant,cgs=CARGOS.filter(cg=>S.employees.some(e=>e.cg===cg));
  // Waterfall: BL + VR por cargo
  const labels=[...cgs,'TOTAL'];
  const blData=[],vrData=[];let cumBL=0,cumVR=0;
  cgs.forEach(cg=>{
    const es=S.employees.filter(e=>e.cg===cg);
    const bl=es.reduce((s,e)=>s+bonAnt(e,at).bl,0);
    const vr=es.reduce((s,e)=>s+bonAnt(e,at).vr,0);
    blData.push([cumBL,cumBL+bl]);vrData.push([cumVR+bl,cumVR+bl+vr]);
    cumBL+=bl;cumVR+=bl+vr;
  });
  blData.push([0,cumBL]);vrData.push([cumBL,cumBL+cumVR-cumBL]);
  mkChart('ch-ant-wf',{type:'bar',data:{labels,datasets:[
    {label:'Baseline',data:blData,backgroundColor:'#7C3AED',borderRadius:3},
    {label:'Variável',data:vrData,backgroundColor:'#A78BFA',borderRadius:3}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:'Inter',size:11},boxWidth:10}},
    datalabels:{color:'#fff',font:{size:9,weight:'700'},anchor:'center',align:'center',
      formatter:(v)=>Array.isArray(v)&&(v[1]-v[0])>50000?Rk(v[1]-v[0]):'',
      display:ctx=>{const v=ctx.dataset.data[ctx.dataIndex];return Array.isArray(v)&&(v[1]-v[0])>100000;}

}

  const bgs=[...cgs.map(cg=>CARGO_CLR[cg]||'#059669'),'#1a1a1a'];

  '<div class="cb"><div class="cbox" style="height:320px"><canvas id="ch-sen"></canvas></div></div></div>'+
  '<div class="card"><div class="ch"><span class="ct">Tabela de Sensibilidade</span></div><div class="cb twrap">'+
  '<table class="tbl"><thead><tr><th>Ating.</th>'+
  '<th class="num" style="color:#7C3AED">Ant. Total</th>'+
  '<th class="num" style="color:#7C3AED">Ant. Baseline</th>'+
  '<th class="num" style="color:#A78BFA">Ant. Variável</th>'+
  '<th class="num" style="color:#059669">Atual</th>'+
  '<th class="num">Δ (Atu-Ant)</th>'+
  '<th class="num">Ant. %Rec</th><th class="num">Atu. %Rec</th>'+
  '<th class="num">Ant. %LB</th><th class="num">Atu. %LB</th>'+
  '</tr></thead><tbody>'+
  SENS.map(sc=>{
    const pa=poolAnt(sc),bla2=blAnt(sc),vra2=vrAnt(sc),pu=poolAtu(sc);
    const rr=recReal(sc),lr=lbReal(sc),d=pu-pa;
    return'<tr'+(sc===100?' style="background:#faf5ff"':'')+'>'+
      '<td><strong>'+sc+'%</strong></td>'+
      '<td class="num" style="font-weight:700;color:#7C3AED">'+R(pa)+'</td>'+
      '<td class="num" style="color:#7C3AED">'+R(bla2)+'</td>'+
      '<td class="num" style="color:#A78BFA">'+R(vra2)+'</td>'+
      '<td class="num" style="font-weight:700;color:#059669">'+R(pu)+'</td>'+
      '<td class="num" style="font-weight:700;color:'+(d>=0?'#059669':'#DC2626')">'+(d>=0?'+':'')+R(d)+'</td>'+
      '<td class="num">'+P2(pa/rr)+'</td><td class="num">'+P2(pu/rr)+'</td>'+
      '<td class="num">'+P2(pa/lr)+'</td><td class="num">'+P2(pu/lr)+'</td>'+
      '</tr>';}).join('')+
  '</tbody></table></div></div>';
}

function kpiCard(label,val,sub,color){
  return'<div class="kpi"><div class="kl">'+label+'</div>'+
    '<div class="kv"'+(color?' style="color:'+color+'"':'')+'>'+val+'</div>'+
    (sub?'<div class="ks">'+sub+'</div>':'')+
    '</div>';
}

function render(){
  document.getElementById('tabs').innerHTML=TABS.map(t=>'<button class="tb '+(t.cl||'')+' '+(S.tab===t.id?'on':'')+'" data-tab="'+t.id+'">'+t.lb+'</button>').join('');
  const pg=document.getElementById('pg');
  if(S.tab==='cfg')pg.innerHTML=tCfg();
  else if(S.tab==='ant')pg.innerHTML=tAnt();
  else if(S.tab==='atu')pg.innerHTML=tAtu();
  else if(S.tab==='cmp')pg.innerHTML=tCmp();
  else if(S.tab==='sen')pg.innerHTML=tSen();
  document.getElementById('hinfo').textContent=S.employees.length+' elegíveis';
  bindEvt();
  setTimeout(drawAll,80);
  saveAll(false);
}

function bindEvt(){
  document.querySelectorAll('.tb').forEach(b=>b.addEventListener('click',()=>{S.tab=b.dataset.tab;render();}));
  document.querySelectorAll('.ei').forEach(inp=>inp.addEventListener('change',()=>{
    const id=+inp.dataset.id,f=inp.dataset.f,e=S.employees.find(x=>x.id===id);
    if(e)e[f]=(f==='sal')?+inp.value:inp.value;
    if(S.tab!=='cfg')render();
  }));
}

loadAll().then(()=>render());
</script></body></html>
