// Supabase
async function supaSet(d){
  const r=await fetch(SU+'/rest/v1/rv_comp',{method:'POST',
    headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify({id:'main',data:d,updated_at:new Date().toISOString()})});
  if(!r.ok) throw new Error(await r.text());
}
async function supaGet(){
  const r=await fetch(SU+'/rest/v1/rv_comp?id=eq.main&select=data,updated_at',
    {headers:{'apikey':SK,'Authorization':'Bearer '+SK}});
  const rows=await r.json();return rows&&rows.length?rows[0]:null;
}
function snap(){return {v:1,ts:new Date().toISOString(),fin:S.fin,ating:S.ating,ant:S.ant,atu:S.atu,employees:S.employees};}
async function saveAll(manual){
  if(!S.employees||!S.employees.length)return;
  let ok=false;
  try{await supaSet(snap());ok=true;}catch(e){console.warn(e);}
  const el=document.getElementById('smsg');
  if(el){
    el.textContent=ok?'✓ Salvo '+new Date().toLocaleTimeString('pt-BR'):'⚠ Erro';
    el.style.color=ok?'#4ade80':'#f87171';
    el.style.opacity='1';
    if(!manual)setTimeout(()=>{el.style.opacity='0';},2500);
  }
}
async function loadAll(){
  try{
    const row=await supaGet();
    if(row&&row.data&&row.data.employees&&row.data.employees.length>0){
      const d=row.data;
      if(d.fin)S.fin=d.fin;if(d.ating)S.ating=d.ating;
      if(d.ant)S.ant=d.ant;if(d.atu)S.atu=d.atu;
      if(d.employees)S.employees=d.employees;
      const el=document.getElementById('smsg');
      if(el&&row.updated_at){
        el.textContent='✓ Recuperado: '+new Date(row.updated_at).toLocaleString('pt-BR');
        el.style.color='#4ade80';el.style.opacity='1';
        setTimeout(()=>{el.style.opacity='0';},4000);
      }
      return true;
    }
  }catch(e){console.warn(e);}
  return false;
}

// Calcs
function cgLbl(cg){return '<span style="color:'+CC[cg]+';font-weight:600">'+cg+'</span>';}
function fatorProp(at,piso,teto){
  if(at<piso)return 0;
  if(teto===piso)return 1;
  return Math.min((at-piso)/(teto-piso),1);
}
function bonAnt(e,at){
  const par=S.ant.params[e.cg]||{bl:1,v:0,el:false};
  const bl=at>=S.ant.gatilho?e.sal*par.bl:0;
  const vr=par.el?e.sal*par.v*fatorProp(at,S.ant.piso,S.ant.teto):0;
  return{bl,vr,tot:bl+vr};
}
function bonAtu(e,at){
  const m=S.atu.mult[e.cg]||{F:2,M:1};
  return e.sal*(e.ta==='Fim'?m.F:m.M)*fatorProp(at,S.atu.piso,S.atu.teto);
}
function poolAnt(at){return S.employees.reduce((s,e)=>s+bonAnt(e,at).tot,0);}
function blAnt(at){return S.employees.reduce((s,e)=>s+bonAnt(e,at).bl,0);}
function vrAnt(at){return S.employees.reduce((s,e)=>s+bonAnt(e,at).vr,0);}
function poolAtu(at){return S.employees.reduce((s,e)=>s+bonAtu(e,at),0);}
function recR(at){return S.fin.rec*at/100;}
function lbR(at){return S.fin.lb*at/100;}

// Chart engine
const _ch={};
function mkChart(id,cfg){try{if(_ch[id]){_ch[id].destroy();delete _ch[id];}const el=document.getElementById(id);if(!el)return;_ch[id]=new Chart(el,cfg);}catch(e){}}

function drawAll(){
  const t=S.tab;
  if(t==='ant')drawAnt();
  else if(t==='atu')drawAtu();
  else if(t==='cmp')drawCmp();
  else if(t==='sen')drawSen();
}

function mkLine(id,labels,datasets){
  mkChart(id,{type:'line',data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{size:11},boxWidth:10}},
        datalabels:{display:false},
        tooltip:{callbacks:{label:i=>' '+Rk(i.raw)}}},
      scales:{x:{grid:{color:gc},ticks:{font:{size:10}}},y:{grid:{color:gc},ticks:{font:{size:10},callback:v=>Rk(v)}}}}});
}

function drawAnt(){
  const at=S.ating.ant;
  const cgsAct=CG.filter(cg=>S.employees.some(e=>e.cg===cg));
  const bls=cgsAct.map(cg=>S.employees.filter(e=>e.cg===cg).reduce((s,e)=>s+bonAnt(e,at).bl,0));
  const vrs=cgsAct.map(cg=>S.employees.filter(e=>e.cg===cg).reduce((s,e)=>s+bonAnt(e,at).vr,0));
  mkChart('ch-ant',{type:'bar',data:{labels:cgsAct,datasets:[
    {label:'Baseline',data:bls,backgroundColor:'#7C3AED',borderRadius:3},
    {label:'Variavel',data:vrs,backgroundColor:'#A78BFA',borderRadius:3}
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{font:{size:11},boxWidth:10}},
      datalabels:{color:'#fff',anchor:'end',align:'top',font:{size:9,weight:'700'},
        formatter:v=>v>10000?Rk(v):'',display:ctx=>ctx.dataset.data[ctx.dataIndex]>10000},
      tooltip:{callbacks:{label:i=>' '+Rk(i.raw)}}},
    scales:{x:{grid:{color:gc},stacked:true,ticks:{font:{size:10}}},
            y:{grid:{color:gc},stacked:true,ticks:{font:{size:10},callback:v=>Rk(v)}}}}});
}
function drawAtu(){
  const at=S.ating.atu;
  const cgsAct=CG.filter(cg=>S.employees.some(e=>e.cg===cg));
  const vals=cgsAct.map(cg=>S.employees.filter(e=>e.cg===cg).reduce((s,e)=>s+bonAtu(e,at),0));
  mkChart('ch-atu',{type:'bar',data:{labels:cgsAct,datasets:[
    {data:vals,backgroundColor:cgsAct.map(cg=>CC[cg]),borderRadius:3}
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},
      datalabels:{color:'#fff',anchor:'end',align:'top',font:{size:9,weight:'700'},
        formatter:v=>v>10000?Rk(v):'',display:ctx=>ctx.dataset.data[ctx.dataIndex]>10000},
      tooltip:{callbacks:{label:i=>' '+Rk(i.raw)}}},
    scales:{x:{grid:{color:gc},ticks:{font:{size:10}}},y:{grid:{color:gc},ticks:{font:{size:10},callback:v=>Rk(v)}}}}});
}
function drawCmp(){
  const aa=S.ating.ant,au=S.ating.atu;
  const pa=poolAnt(aa),pu=poolAtu(au);
  mkChart('ch-cmp',{type:'bar',data:{labels:['Modelo Anterior','Modelo Atual'],datasets:[
    {data:[pa,pu],backgroundColor:['#7C3AED','#059669'],borderRadius:5,barThickness:60}
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},
      datalabels:{color:'#fff',anchor:'center',align:'center',font:{size:12,weight:'700'},formatter:v=>Rk(v)},

    scales:{x:{grid:{display:false},ticks:{font:{size:12,weight:'600'}}},y:{grid:{color:gc},ticks:{font:{size:10},callback:v=>Rk(v)}}}}});
}
function drawSen(){
  const ds=[
    {label:'Anterior Total',data:SENS.map(s=>poolAnt(s)),borderColor:'#7C3AED',backgroundColor:'#7C3AED15',fill:false,tension:.3,pointRadius:3,borderWidth:2},

  ];

}

  let h='<div class="ptitle mb3">Configuracao Geral</div><div class="g2 mb4">';

function tAnt(){
  const at=S.ating.ant,rr=recR(at),lr=lbR(at);
  const pa=poolAnt(at),bla=blAnt(at),vra=vrAnt(at),n=S.employees.length;
  const cgsAct=CG.filter(cg=>S.employees.some(e=>e.cg===cg));
  let h='<div class="ptitle mb3">Modelo Anterior — Atingimento: '+Pp(at)+'%</div>';
  h+='<div class="g5 mb4">';
  h+=kpi('Pool Total',Rk(pa),P2(pa/rr)+' da rec. real');
  h+=kpi('Baseline',Rk(bla),P1(bla/pa)+' do pool','#7C3AED');
  h+=kpi('Variavel',Rk(vra),P1(vra/pa)+' do pool','#A78BFA');
  h+=kpi('Pool / LB Real',P2(pa/lr),'LB real: '+Rk(lr),'#059669');
  h+=kpi('Bonus Medio',n?R(pa/n):'—',n+' elegiveis');
  h+='</div>';
  h+='<div class="card mb4"><div class="ch"><span class="ct">Baseline + Variavel por Cargo (empilhado)</span></div><div class="cb"><div class="cbox"><canvas id="ch-ant"></canvas></div></div></div>';
  h+='<div class="card mb4"><div class="ch"><span class="ct">Por Cargo — Detalhamento</span></div><div class="cb twrap"><table class="tbl">';
  h+='<thead><tr><th>Cargo</th><th class="num">N</th><th class="num">Baseline</th><th class="num">Variavel</th><th class="num">Total</th><th class="num">% Pool</th><th class="num">% Rec Real</th><th class="num">% LB Real</th></tr></thead><tbody>';
  cgsAct.forEach(cg=>{
    const es=S.employees.filter(e=>e.cg===cg);
    const bl=es.reduce((s,e)=>s+bonAnt(e,at).bl,0);
    const vr=es.reduce((s,e)=>s+bonAnt(e,at).vr,0);
    const tot=bl+vr;
    const c=tot/lr>.15?'#DC2626':tot/lr>.07?'#D97706':'#059669';
    h+='<tr><td>'+cgLbl(cg)+'</td><td class="num">'+es.length+'</td><td class="num">'+R(bl)+'</td><td class="num">'+R(vr)+'</td>';
    h+='<td class="num" style="font-weight:700">'+R(tot)+'</td><td class="num">'+P1(tot/pa)+'</td><td class="num">'+P2(tot/rr)+'</td>';
    h+='<td class="num" style="font-weight:600;color:'+c+'">'+P2(tot/lr)+'</td></tr>';
  });
  h+='<tr class="tr-tot"><td>TOTAL</td><td class="num">'+n+'</td><td class="num">'+R(bla)+'</td><td class="num">'+R(vra)+'</td><td class="num">'+R(pa)+'</td><td class="num">100%</td><td class="num">'+P2(pa/rr)+'</td><td class="num" style="font-weight:700">'+P2(pa/lr)+'</td></tr>';
  h+='</tbody></table></div></div>';
  h+='<div class="card"><div class="ch"><span class="ct">Por Pessoa</span></div><div class="cb twrap"><table class="tbl">';
  h+='<thead><tr><th>Nome</th><th>BU</th><th>Cargo</th><th class="num">Salario</th><th class="num">Baseline</th><th class="num">Variavel</th><th class="num">Total</th></tr></thead><tbody>';
  [...S.employees].sort((a,b)=>(COR_CG[a.cg]||9)-(COR_CG[b.cg]||9)).forEach(e=>{
    const b=bonAnt(e,at);
    h+='<tr><td style="font-weight:500">'+e.n+'</td><td>'+e.bu+'</td><td>'+cgLbl(e.cg)+'</td>';
    h+='<td class="num">'+R(e.sal)+'</td><td class="num">'+R(b.bl)+'</td><td class="num">'+R(b.vr)+'</td>';
    h+='<td class="num" style="font-weight:700;color:#7C3AED">'+R(b.tot)+'</td></tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

  h+='<div class="g5 mb4">';
  h+=kpi('Pool Total',Rk(pu),P2(pu/rr)+' da rec. real','#059669');
  h+=kpi('Pool / LB Real',P2(pu/lr),'LB real: '+Rk(lr),'#059669');
  h+=kpi('Rec Realizada',Rk(rr),'Budget: '+Rk(S.fin.rec));
  h+=kpi('LB Realizado',Rk(lr),'Budget: '+Rk(S.fin.lb));
  h+=kpi('Bonus Medio',n?R(pu/n):'—',n+' elegiveis');
  h+='</div>';
  h+='<div class="card mb4"><div class="ch"><span class="ct">Pool por Cargo</span></div><div class="cb"><div class="cbox"><canvas id="ch-atu"></canvas></div></div></div>';
  h+='<div class="card mb4"><div class="ch"><span class="ct">Por Cargo</span></div><div class="cb twrap"><table class="tbl">';
  h+='<thead><tr><th>Cargo</th><th class="num">N</th><th class="num">Pool</th><th class="num">% Pool</th><th class="num">% Rec Real</th><th class="num">% LB Real</th></tr></thead><tbody>';
  cgsAct.forEach(cg=>{
    const es=S.employees.filter(e=>e.cg===cg);
    const p=es.reduce((s,e)=>s+bonAtu(e,at),0);
    const c=p/lr>.15?'#DC2626':p/lr>.07?'#D97706':'#059669';
    h+='<tr><td>'+cgLbl(cg)+'</td><td class="num">'+es.length+'</td><td class="num" style="font-weight:600">'+R(p)+'</td>';
    h+='<td class="num">'+P1(p/pu)+'</td><td class="num">'+P2(p/rr)+'</td><td class="num" style="font-weight:600;color:'+c+'">'+P2(p/lr)+'</td></tr>';
  });
  h+='<tr class="tr-tot"><td>TOTAL</td><td class="num">'+n+'</td><td class="num">'+R(pu)+'</td><td class="num">100%</td><td class="num">'+P2(pu/rr)+'</td><td class="num" style="font-weight:700">'+P2(pu/lr)+'</td></tr>';
  h+='</tbody></table></div></div>';
  h+='<div class="card"><div class="ch"><span class="ct">Por Pessoa</span></div><div class="cb twrap"><table class="tbl">';
  h+='<thead><tr><th>Nome</th><th>BU</th><th>Cargo</th><th>Tipo</th><th class="num">Salario</th><th class="num">Mult</th><th class="num">Bonus</th></tr></thead><tbody>';

    h+='<tr><td style="font-weight:500">'+e.n+'</td><td>'+e.bu+'</td><td>'+cgLbl(e.cg)+'</td><td>'+pill(e.ta)+'</td>';
    h+='<td class="num">'+R(e.sal)+'</td><td class="num">'+mult+'x</td>';
    h+='<td class="num" style="font-weight:700;color:#059669">'+R(bonAtu(e,at))+'</td></tr>';

  return h;

function tCmp(){
  const aa=S.ating.ant,au=S.ating.atu;
  const pa=poolAnt(aa),pu=poolAtu(au),bla=blAnt(aa),vra=vrAnt(aa);
  const rra=recR(aa),lra=lbR(aa),rru=recR(au),lru=lbR(au);
  const diff=pu-pa,n=S.employees.length;
  const cgsAct=CG.filter(cg=>S.employees.some(e=>e.cg===cg));
  let h='<div class="ptitle mb3">Comparacao de Modelos</div>';
  h+='<div class="g4 mb4">';
  h+=kpi('Pool Anterior',Rk(pa),P2(pa/rra)+' rec | '+P2(pa/lra)+' LB','#7C3AED');
  h+=kpi('Pool Atual',Rk(pu),P2(pu/rru)+' rec | '+P2(pu/lru)+' LB','#059669');
  h+=kpi('Diferenca (Atu-Ant)',Rk(Math.abs(diff)),(diff>=0?'Atual maior':'Anterior maior'),diff>=0?'#059669':'#7C3AED');
  h+=kpi('Impacto por Pessoa',R(Math.abs(diff)/n),'media','#EA580C');
  h+='</div>';
  h+='<div class="card mb4"><div class="ch"><span class="ct">Pool Total — Anterior vs Atual</span></div><div class="cb"><div class="cbox" style="height:260px"><canvas id="ch-cmp"></canvas></div></div></div>';
  h+='<div class="card mb4"><div class="ch"><span class="ct">Por Cargo — Comparacao Detalhada</span></div><div class="cb twrap"><table class="tbl">';
  h+='<thead><tr><th>Cargo</th><th class="num">N</th>';
  h+='<th class="num" style="color:#7C3AED">Ant BL</th><th class="num" style="color:#A78BFA">Ant Var</th><th class="num" style="color:#7C3AED">Ant Total</th>';
  h+='<th class="num" style="color:#059669">Atual</th><th class="num">Delta</th>';
  h+='<th class="num">Ant %Rec</th><th class="num">Atu %Rec</th><th class="num">Ant %LB</th><th class="num">Atu %LB</th></tr></thead><tbody>';
  cgsAct.forEach(cg=>{
    const es=S.employees.filter(e=>e.cg===cg);
    const bl=es.reduce((s,e)=>s+bonAnt(e,aa).bl,0);
    const vr=es.reduce((s,e)=>s+bonAnt(e,aa).vr,0);
    const ta=bl+vr,tu=es.reduce((s,e)=>s+bonAtu(e,au),0),d=tu-ta;
    h+='<tr><td>'+cgLbl(cg)+'</td><td class="num">'+es.length+'</td>';
    h+='<td class="num" style="color:#7C3AED">'+R(bl)+'</td><td class="num" style="color:#A78BFA">'+R(vr)+'</td>';
    h+='<td class="num" style="font-weight:600;color:#7C3AED">'+R(ta)+'</td>';
    h+='<td class="num" style="font-weight:600;color:#059669">'+R(tu)+'</td>';
    h+='<td class="num" style="font-weight:700;color:'+(d>=0?'#059669':'#DC2626')+'">'+(d>=0?'+':'')+R(d)+'</td>';
    h+='<td class="num">'+P2(ta/rra)+'</td><td class="num">'+P2(tu/rru)+'</td>';
    h+='<td class="num">'+P2(ta/lra)+'</td><td class="num">'+P2(tu/lru)+'</td></tr>';
  });
  h+='<tr class="tr-tot"><td>TOTAL</td><td class="num">'+n+'</td>';
  h+='<td class="num" style="color:#7C3AED">'+R(bla)+'</td><td class="num" style="color:#A78BFA">'+R(vra)+'</td>';
  h+='<td class="num" style="font-weight:700;color:#7C3AED">'+R(pa)+'</td>';
  h+='<td class="num" style="font-weight:700;color:#059669">'+R(pu)+'</td>';
  h+='<td class="num" style="font-weight:700;color:'+(diff>=0?'#059669':'#DC2626')+'">'+(diff>=0?'+':'')+R(diff)+'</td>';
  h+='<td class="num">'+P2(pa/rra)+'</td><td class="num">'+P2(pu/rru)+'</td>';
  h+='<td class="num">'+P2(pa/lra)+'</td><td class="num">'+P2(pu/lru)+'</td></tr>';
  h+='</tbody></table></div></div>';
  h+='<div class="card"><div class="ch"><span class="ct">Por Pessoa — Comparativo Individual</span></div><div class="cb twrap"><table class="tbl">';
  h+='<thead><tr><th>Nome</th><th>Cargo</th><th class="num" style="color:#7C3AED">Ant BL</th><th class="num" style="color:#A78BFA">Ant Var</th><th class="num" style="color:#7C3AED">Ant Total</th><th class="num" style="color:#059669">Atual</th><th class="num">Delta</th></tr></thead><tbody>';
  [...S.employees].sort((a,b)=>(COR_CG[a.cg]||9)-(COR_CG[b.cg]||9)).forEach(e=>{
    const ba=bonAnt(e,aa),bu2=bonAtu(e,au),d=bu2-ba.tot;
    h+='<tr><td style="font-weight:500">'+e.n+'</td><td>'+cgLbl(e.cg)+'</td>';
    h+='<td class="num" style="color:#7C3AED">'+R(ba.bl)+'</td><td class="num" style="color:#A78BFA">'+R(ba.vr)+'</td>';
    h+='<td class="num" style="font-weight:600;color:#7C3AED">'+R(ba.tot)+'</td>';
    h+='<td class="num" style="font-weight:600;color:#059669">'+R(bu2)+'</td>';
    h+='<td class="num" style="font-weight:700;color:'+(d>=0?'#059669':'#DC2626')+'">'+(d>=0?'+':'')+R(d)+'</td></tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

function tSen(){
  let h='<div class="ptitle mb3">Sensibilidade — Ambos os Modelos</div>';
  h+='<div class="card mb4"><div class="ch"><span class="ct">Pool x Atingimento</span></div><div class="cb"><div class="cbox" style="height:320px"><canvas id="ch-sen"></canvas></div></div></div>';
  h+='<div class="card"><div class="ch"><span class="ct">Tabela de Sensibilidade</span></div><div class="cb twrap"><table class="tbl">';
  h+='<thead><tr><th>Ating</th>';
  h+='<th class="num" style="color:#7C3AED">Ant Total</th><th class="num" style="color:#7C3AED">Ant BL</th><th class="num" style="color:#A78BFA">Ant Var</th>';
  h+='<th class="num" style="color:#059669">Atual</th><th class="num">Delta</th>';
  h+='<th class="num">Ant %Rec</th><th class="num">Atu %Rec</th><th class="num">Ant %LB</th><th class="num">Atu %LB</th></tr></thead><tbody>';
  SENS.forEach(sc=>{
    const pa=poolAnt(sc),bla2=blAnt(sc),vra2=vrAnt(sc),pu=poolAtu(sc);
    const rr=recR(sc),lr=lbR(sc),d=pu-pa;
    h+='<tr'+(sc===100?' class="hi"':'')+'>'+
      '<td><strong>'+sc+'%</strong></td>'+
      '<td class="num" style="font-weight:700;color:#7C3AED">'+R(pa)+'</td>'+
      '<td class="num" style="color:#7C3AED">'+R(bla2)+'</td>'+
      '<td class="num" style="color:#A78BFA">'+R(vra2)+'</td>'+
      '<td class="num" style="font-weight:700;color:#059669">'+R(pu)+'</td>'+
      '<td class="num" style="font-weight:700;color:'+(d>=0?'#059669':'#DC2626')+'">'+(d>=0?'+':'')+R(d)+'</td>'+
      '<td class="num">'+P2(pa/rr)+'</td><td class="num">'+P2(pu/rr)+'</td>'+
      '<td class="num">'+P2(pa/lr)+'</td><td class="num">'+P2(pu/lr)+'</td></tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

// Deep set via path
function setPath(obj,path,val){
  const parts=path.split('.');
  let cur=obj;
  for(let i=0;i<parts.length-1;i++){
    if(!cur[parts[i]])cur[parts[i]]={};
    cur=cur[parts[i]];
  }
  cur[parts[parts.length-1]]=val;
}

function render(){
  document.getElementById('tabs').innerHTML=TABS.map(t=>'<button class="tb '+(t.c||'')+' '+(S.tab===t.id?'on':'')+'" data-tab="'+t.id+'">'+t.l+'</button>').join('');
  const pg=document.getElementById('pg');
  if(S.tab==='cfg')pg.innerHTML=tCfg();
  else if(S.tab==='ant')pg.innerHTML=tAnt();
  else if(S.tab==='atu')pg.innerHTML=tAtu();
  else if(S.tab==='cmp')pg.innerHTML=tCmp();
  else if(S.tab==='sen')pg.innerHTML=tSen();
  document.getElementById('hinfo').textContent=S.employees.length+' elegiveis';
  bindEvt();
  setTimeout(drawAll,80);
  saveAll(false);
}

function bindEvt(){
  document.querySelectorAll('.tb').forEach(b=>b.addEventListener('click',()=>{S.tab=b.dataset.tab;render();}));
  // Config inputs
  document.querySelectorAll('.cfg-inp').forEach(inp=>inp.addEventListener('change',()=>{
    let v=+inp.value;
    setPath(S,inp.dataset.path,v);
    render();
  }));
  // Config checkboxes
  document.querySelectorAll('.cfg-chk').forEach(cb=>cb.addEventListener('change',()=>{
    setPath(S,cb.dataset.path,cb.checked);
    render();
  }));
  // Salary inputs
  document.querySelectorAll('.sal-inp').forEach(inp=>inp.addEventListener('change',()=>{
    const e=S.employees.find(x=>x.id===+inp.dataset.id);
    if(e)e.sal=+inp.value;
    render();
  }));
}

loadAll().then(()=>render());
