// Calcs
function atFor(bu,d){const m=(d||D()).cfg[bu].meta,tp=m.emp.p+m.bu.p+m.ar.p;return tp?(m.emp.p*m.emp.a+m.bu.p*m.bu.a+m.ar.p*m.ar.a)/tp:0;}
function bonFor(e,at,d){
  const dd=d||D(),cfg=dd.cfg[e.bu];
  const mc=(dd.multCfg[e.bu]?.[e.cg])||{bl_F:1,bl_M:1,v_F:0,v_M:0,el_F:false,el_M:false};
  const fim=e.ta==='Fim';
  const bl=at>=100?e.sal*(fim?mc.bl_F:mc.bl_M):0;
  const el=fim?mc.el_F:mc.el_M;
  const f=at<cfg.piso?0:Math.min((at-cfg.piso)/(cfg.teto-cfg.piso),1);
  const v=el?e.sal*(fim?mc.v_F:mc.v_M)*f:0;
  return{bl,v,tot:bl+v};
}
function bon(e){return bonFor(e,atFor(e.bu,D()),D());}
function poolBuAt(bu,at,d){return(d||D()).employees.filter(e=>e.bu===bu).reduce((s,e)=>s+bonFor(e,at,d||D()).tot,0);}
function poolBu(bu,at){return poolBuAt(bu,at!==undefined?at:atFor(bu,D()),D());}
function poolAll(at,d){const dd=d||D();return dd.employees.reduce((s,e)=>s+bonFor(e,at!==undefined?at:atFor(e.bu,dd),dd).tot,0);}
function recReal(bu,d){const dd=d||D();return dd.cfg[bu].rec*(atFor(bu,dd)/100);}
function lbReal(bu,d){const dd=d||D();return dd.cfg[bu].lb*(atFor(bu,dd)/100);}
function totRecReal(d){return BUS.reduce((s,bu)=>s+recReal(bu,d),0);}
function totLbReal(d){return BUS.reduce((s,bu)=>s+lbReal(bu,d),0);}
function bbu(bu,d){return(d||D()).employees.filter(e=>e.bu===bu);}
function grpByCg(es){const g={};es.forEach(e=>{if(!g[e.cg])g[e.cg]=[];g[e.cg].push(e);});return Object.entries(g).sort((a,b)=>(COR[a[0]]??9)-(COR[b[0]]??9));}
function cgTag(cg){return`<span style="color:${CARGO_CLR[cg]||'#999'};font-weight:600">${cg}</span>`;}
function buT(bu){const c=BUC[bu]||'#666';return`<span style="background:${c}15;color:${c};padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">${bu}</span>`;}
function bid(bu){return bu.replace(/[\s\/]/g,'-');}
function sem(v){return v>.15?'#DC2626':v>.07?'#D97706':'#059669';}

// Charts
const _ch={};
function mkChart(id,cfg){try{if(_ch[id]){_ch[id].destroy();delete _ch[id];}const el=document.getElementById(id);if(!el)return;_ch[id]=new Chart(el,cfg);}catch(e){}}
const gc='rgba(0,0,0,.05)';
const dlFmt=v=>Rk(Array.isArray(v)?v[1]-v[0]:v);
const dlShow=ctx=>{const v=ctx.dataset.data[ctx.dataIndex];return(Array.isArray(v)?v[1]-v[0]:v)>8000;};
function mkWF(id,groups,color){
  if(!groups.length)return;
  const labels=[...groups.map(g=>g.l),'TOTAL'],fd=[];let cum=0;
  groups.forEach(g=>{fd.push([cum,cum+g.v]);cum+=g.v;});fd.push([0,cum]);
  const bgs=[...groups.map((_,i)=>CARGO_CLR[groups[i].l]||color),'#1a1a1a'];
  mkChart(id,{type:'bar',data:{labels,datasets:[{data:fd,backgroundColor:bgs,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:i=>` ${Rk(Array.isArray(i.raw)?i.raw[1]-i.raw[0]:i.raw)}`}},datalabels:{color:'#fff',anchor:'center',align:'center',font:{family:'Inter',size:10,weight:'700'},formatter:dlFmt,display:dlShow}},scales:{x:{grid:{color:gc},ticks:{font:{family:'Inter',size:10}}},y:{grid:{color:gc},ticks:{font:{family:'Inter',size:10},callback:v=>Rk(v)}}}}});
}
function mkDonut(id,labels,values,colors,total){
  mkChart(id,{type:'doughnut',data:{labels,datasets:[{data:values,backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{font:{family:'Inter',size:11},boxWidth:10,padding:8}},tooltip:{callbacks:{label:i=>` ${Rk(i.raw)} — ${P1(i.raw/(total||1))}`}},datalabels:{color:'#fff',font:{family:'Inter',size:11,weight:'700'},formatter:v=>P1(v/(total||1)),display:ctx=>ctx.dataset.data[ctx.dataIndex]/(total||1)>.08}}}});
}
function mkLine(id,labels,datasets){
  mkChart(id,{type:'line',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:'Inter',size:11},boxWidth:10}},tooltip:{callbacks:{label:i=>` ${Rk(i.raw)}`}},datalabels:{color:'#fff',backgroundColor:ctx=>ctx.dataset.borderColor,borderRadius:3,padding:{top:2,bottom:2,left:4,right:4},font:{family:'Inter',size:9,weight:'700'},formatter:v=>Rk(v),display:ctx=>ctx.dataIndex%2===0}},scales:{x:{grid:{color:gc},ticks:{font:{family:'Inter',size:10}}},y:{grid:{color:gc},ticks:{font:{family:'Inter',size:10},callback:v=>Rk(v)}}}}});
}
function mkBar2(id,labels,d1,d2,l1,l2,c1,c2){
  mkChart(id,{type:'bar',data:{labels,datasets:[{label:l1,data:d1,backgroundColor:c1+'90',borderColor:c1,borderWidth:2,borderRadius:4},{label:l2,data:d2,backgroundColor:c2+'90',borderColor:c2,borderWidth:2,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:'Inter',size:11},boxWidth:10}},tooltip:{callbacks:{label:i=>` ${Rk(i.raw)}`}},datalabels:{display:false}},scales:{x:{grid:{color:gc},ticks:{font:{family:'Inter',size:10}}},y:{grid:{color:gc},ticks:{font:{family:'Inter',size:10},callback:v=>Rk(v)}}}}});
}
function mkStackedBar(id,labels,blData,vData,c1,c2){
  mkChart(id,{type:'bar',data:{labels,datasets:[{label:'Baseline',data:blData,backgroundColor:c1,borderRadius:4},{label:'Variável',data:vData,backgroundColor:c2,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:'Inter',size:11},boxWidth:10}},datalabels:{display:false}},scales:{x:{grid:{color:gc},ticks:{font:{family:'Inter',size:10}}},y:{stacked:true,grid:{color:gc},ticks:{font:{family:'Inter',size:10},callback:v=>Rk(v)}}}}});
}

function drawCharts(){
  const t=S.tab;
  if(t==='gr')drawGrp();
  else if(BUS.includes(t))drawBU(t);
  else if(t==='cmp')drawCmp();
}
function drawGrp(){
  const d=D();
  mkWF('ch-wf-grp',grpByCg(d.employees).map(([l,es])=>({l,v:es.reduce((s,e)=>s+bon(e).tot,0)})),'#7C3AED');
  const fim=d.employees.filter(e=>e.ta==='Fim').reduce((s,e)=>s+bon(e).tot,0);
  const meio=d.employees.filter(e=>e.ta==='Meio').reduce((s,e)=>s+bon(e).tot,0);
  mkDonut('ch-fm-grp',['Área Fim','Área Meio'],[fim,meio],['#7C3AED','#D1D5DB'],fim+meio);
  const cgs=grpByCg(d.employees);
  mkStackedBar('ch-bl-v',cgs.map(([l])=>l),cgs.map(([,es])=>es.reduce((s,e)=>s+bon(e).bl,0)),cgs.map(([,es])=>es.reduce((s,e)=>s+bon(e).v,0)),'#94a3b8','#7C3AED');
  const ds=BUS.map(bu=>({label:bu,data:SENS.map(s=>poolBuAt(bu,s,d)),borderColor:BUC[bu],backgroundColor:BUC[bu]+'15',fill:false,tension:.3,pointRadius:3,borderWidth:2}));
  ds.push({label:'Grupo Total',data:SENS.map(s=>poolAll(s,d)),borderColor:'#1a1a1a',backgroundColor:'#1a1a1a10',fill:true,tension:.3,pointRadius:4,borderWidth:3});
  mkLine('ch-sens-grp',SENS.map(s=>s+'%'),ds);
}
function drawBU(bu){
  const d=D(),col=BUC[bu],es=bbu(bu,d),at=atFor(bu,d);
  const cgs=grpByCg(es);
  mkWF(`ch-wf-${bid(bu)}`,cgs.map(([l,ne])=>({l,v:ne.reduce((s,e)=>s+bonFor(e,at,d).tot,0)})),col);
  const fim=es.filter(e=>e.ta==='Fim').reduce((s,e)=>s+bonFor(e,at,d).tot,0);
  const meio=es.filter(e=>e.ta==='Meio').reduce((s,e)=>s+bonFor(e,at,d).tot,0);
  mkDonut(`ch-fm-${bid(bu)}`,['Área Fim','Área Meio'],[fim,meio],[col,col+'55'],fim+meio);
  mkLine(`ch-sens-${bid(bu)}`,SENS.map(s=>s+'%'),[{label:bu,data:SENS.map(s=>poolBuAt(bu,s,d)),borderColor:col,backgroundColor:col+'25',fill:true,tension:.3,pointRadius:4,borderWidth:2,pointBackgroundColor:col}]);
}
function drawCmp(){
  const dn=S.novo,da=S.antigo,scens=[80,90,100,110,120];
  mkLine('ch-cmp-sens',scens.map(s=>s+'%'),[
    {label:'Modelo Antigo',data:scens.map(s=>poolAll(s,da)),borderColor:'#64748b',backgroundColor:'#64748b15',fill:false,tension:.3,pointRadius:4,borderWidth:2,pointBackgroundColor:'#64748b'},
    {label:'Modelo Novo',  data:scens.map(s=>poolAll(s,dn)),borderColor:'#7C3AED',backgroundColor:'#7C3AED15',fill:false,tension:.3,pointRadius:4,borderWidth:2,pointBackgroundColor:'#7C3AED'},
  ]);
  mkBar2('ch-cmp-bu',BUS,BUS.map(bu=>poolBuAt(bu,atFor(bu,da),da)),BUS.map(bu=>poolBuAt(bu,atFor(bu,dn),dn)),'Modelo Antigo','Modelo Novo','#64748b','#7C3AED');
  const dn2=S.novo,da2=S.antigo;
  const blN=dn2.employees.reduce((s,e)=>s+bonFor(e,atFor(e.bu,dn2),dn2).bl,0);
  const vN=dn2.employees.reduce((s,e)=>s+bonFor(e,atFor(e.bu,dn2),dn2).v,0);
  const blA=da2.employees.reduce((s,e)=>s+bonFor(e,atFor(e.bu,da2),da2).bl,0);
  const vA=da2.employees.reduce((s,e)=>s+bonFor(e,atFor(e.bu,da2),da2).v,0);
  mkBar2('ch-cmp-blv',['Baseline','Variável'],[blA,vA],[blN,vN],'Modelo Antigo','Modelo Novo','#64748b','#7C3AED');
}

        <td class="num">${R(e.ba.bl)}</td><td class="num">${R(e.ba.v)}</td><td class="num ac">${R(e.ba.tot)}</td>
        <td class="num">${R(e.bn.bl)}</td><td class="num">${R(e.bn.v)}</td><td class="num nc">${R(e.bn.tot)}</td>
        <td class="num">${dR(e.delta)}</td><td class="num">${dP(dp)}</td></tr>`;}).join('')}
      </tbody></table></div></div>`;
}

async function supaUpsert(id,data){
  const r=await fetch(`${SU}/rest/v1/rv_state`,{method:'POST',
    headers:{'apikey':SK,'Authorization':`Bearer ${SK}`,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify({id,data,updated_at:new Date().toISOString()})});
  if(!r.ok)throw new Error(await r.text());
}
async function supaFetch(id){
  const r=await fetch(`${SU}/rest/v1/rv_state?id=eq.${id}&select=data,updated_at`,{headers:{'apikey':SK,'Authorization':`Bearer ${SK}`}});
  const rows=await r.json();return rows&&rows.length?rows[0]:null;
}

async function saveState(manual){
  let ok=false;
  try{
    await supaUpsert('novo',{employees:S.novo.employees,multCfg:S.novo.multCfg,cfg:S.novo.cfg,nid:S.novo.nid});
    await supaUpsert('antigo',{employees:S.antigo.employees,multCfg:S.antigo.multCfg,cfg:S.antigo.cfg,nid:S.antigo.nid});
    ok=true;
  }catch(e){console.warn('save err',e);}
  const el=document.getElementById('save-status');
  if(el){el.textContent=ok?`✓ Salvo ${new Date().toLocaleTimeString('pt-BR')}`:'⚠ Erro';el.style.color=ok?'#4ade80':'#f87171';el.style.opacity='1';if(!manual)setTimeout(()=>{el.style.opacity='0';},2500);}
}

async function loadState(){
  try{
    const [rN,rA,rM]=await Promise.all([supaFetch('novo'),supaFetch('antigo'),supaFetch('main')]);
    // Novo
    if(rN&&rN.data){const d=rN.data;if(d.employees)S.novo.employees=d.employees;if(d.multCfg)S.novo.multCfg=d.multCfg;if(d.cfg)S.novo.cfg=d.cfg;if(d.nid)S.novo.nid=d.nid;}
    else if(rM&&rM.data){// seed do main
      const d=rM.data;if(d.employees)S.novo.employees=dc(d.employees);
      if(d.cfg)BUS.forEach(bu=>{if(d.cfg[bu]){S.novo.cfg[bu].rec=d.cfg[bu].rec;S.novo.cfg[bu].lb=d.cfg[bu].lb;}});
    }
    // Antigo
    if(rA&&rA.data){const d=rA.data;if(d.employees)S.antigo.employees=d.employees;if(d.multCfg)S.antigo.multCfg=d.multCfg;if(d.cfg)S.antigo.cfg=d.cfg;if(d.nid)S.antigo.nid=d.nid;}
    else if(rM&&rM.data){// seed do main
      const d=rM.data;if(d.employees)S.antigo.employees=dc(d.employees);
      if(d.cfg)BUS.forEach(bu=>{if(d.cfg[bu]){S.antigo.cfg[bu].rec=d.cfg[bu].rec;S.antigo.cfg[bu].lb=d.cfg[bu].lb;}});
    }
    const el=document.getElementById('save-status');if(el){el.textContent='✓ Dados carregados';el.style.color='#4ade80';el.style.opacity='1';setTimeout(()=>{el.style.opacity='0';},4000);}
    return true;
  }catch(e){console.warn('load err',e);}
  return false;
}

// ─── RENDER ───
function render(){
  document.body.classList.toggle('dark-mode',MDL==='antigo');
  document.getElementById('tabs').innerHTML=TABS.map(t=>`<button class="tb ${t.cl||''} ${S.tab===t.id?'on':''}" data-tab="${t.id}">${t.lb}</button>`).join('');
  const pg=document.getElementById('pg');
  if(S.tab==='mt')pg.innerHTML=tMt();
  else if(S.tab==='gr')pg.innerHTML=tGr();
  else if(BUS.includes(S.tab))pg.innerHTML=tBU(S.tab);
  else if(S.tab==='pl')pg.innerHTML=tPl();
  else if(S.tab==='cmp')pg.innerHTML=tCmp();
  const d=D(),pool=poolAll(undefined,d),lbl=MDL==='novo'?'Novo':'Antigo';
  document.getElementById('hdr-info').textContent=`Modelo ${lbl} · ${d.employees.length} elegíveis · Pool: ${R(pool)}`;
  bindEvt();
  setTimeout(drawCharts,100);
  saveState(false);
}

function bindEvt(){
  document.querySelectorAll('.tb').forEach(b=>b.addEventListener('click',()=>{S.tab=b.dataset.tab;render();}));
  document.querySelectorAll('.ei').forEach(inp=>inp.addEventListener('change',()=>{
    const id=+inp.dataset.id,f=inp.dataset.f,d=D(),e=d.employees.find(x=>x.id===id);
    if(e)e[f]=(f==='sal')?+inp.value:inp.value;
    render();
  }));
  document.querySelectorAll('.dx').forEach(b=>b.addEventListener('click',()=>{D().employees=D().employees.filter(e=>e.id!==+b.dataset.id);render();}));
  document.querySelectorAll('.tbl th[data-sort]').forEach(th=>th.addEventListener('click',()=>{const k=th.dataset.sort;srt.col===k?srt.dir*=-1:(srt.col=k,srt.dir=1);render();}));
  const ae=document.getElementById('add-e');
  if(ae)ae.addEventListener('click',()=>{const d=D();d.employees.push({id:d.nid++,n:'Novo Elegível',bu:'H2Bet',ar:'',cg:'Gerente',ta:'Fim',sal:10000});render();});
}

setInterval(()=>saveState(false),60000);
loadState().then(()=>render());
</script>
